<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIUBY-XMD | Session Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --hacker-green: #00ff41;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a2a3a 0%, #0a0e14 100%);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            position: relative;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            text-align: center;
            font-family: 'Outfit', sans-serif;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .toggle-group {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 2rem;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.8rem;
            cursor: pointer;
            border-radius: 9px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            color: #888;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.3);
        }

        .btn-generate {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 14px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.2);
        }

        .btn-generate:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 2rem;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pairing-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--hacker-green);
            letter-spacing: 5px;
            margin: 1rem 0;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        #qr-display {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            margin: 1rem 0;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .loader {
            display: none;
            margin: 2rem auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 242, 254, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-msg {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 1rem;
        }

        /* Matrix Rain effect background placeholder */
        canvas#bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="glass-card">
            <h1>KIUBY SCANNER</h1>
            <p class="subtitle">Secure WhatsApp Session Linking</p>

            <div class="toggle-group">
                <div class="toggle-btn active" id="mode-pair" onclick="switchMode('pair')">Pairing Code</div>
                <div class="toggle-btn" id="mode-qr" onclick="switchMode('qr')">QR Code</div>
            </div>

            <div class="input-group" id="number-input-container">
                <input type="text" id="phone" placeholder="Ex: 254726498682" maxlength="15">
            </div>

            <button class="btn-generate" id="btn-submit" onclick="startLinking()">Initialize</button>

            <div class="loader" id="loader"></div>

            <div class="result-container" id="result-container">
                <div id="pair-result">
                    <p class="status-msg">Your Pairing Code:</p>
                    <div class="pairing-code" id="code-display">XXXX-XXXX</div>
                    <button class="copy-btn" onclick="copyCode()">Copy Code</button>
                </div>
                <div id="qr-result" style="display: none;">
                    <div id="qr-display"></div>
                    <p class="status-msg">Scan this code with Linked Devices</p>
                </div>
                <p class="status-msg" id="instruction-msg">Check your WhatsApp notifications</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let currentMode = 'pair';
        const phoneInput = document.getElementById('phone');
        const loader = document.getElementById('loader');
        const submitBtn = document.getElementById('btn-submit');
        const resultContainer = document.getElementById('result-container');
        const codeDisplay = document.getElementById('code-display');
        const qrDisplay = document.getElementById('qr-display');

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('mode-pair').classList.toggle('active', mode === 'pair');
            document.getElementById('mode-qr').classList.toggle('active', mode === 'qr');
            document.getElementById('number-input-container').style.display = mode === 'pair' ? 'block' : 'none';
            resultContainer.style.display = 'none';
        }

        async function startLinking() {
            let phone = phoneInput.value.replace(/\D/g, ''); // Remove spaces and non-digits
            
            if (currentMode === 'pair' && (!phone || phone.length < 10)) {
                alert('Please enter a valid phone number with country code');
                return;
            }

            loader.style.display = 'block';
            submitBtn.disabled = true;
            resultContainer.style.display = 'none';

            try {
                const endpoint = currentMode === 'pair' ? `/api/pair?number=${phone}` : `/api/qr`;
                const response = await fetch(endpoint);
                const data = await response.json();

                if (data.status === 'success') {
                    loader.style.display = 'none';
                    resultContainer.style.display = 'block';
                    
                    if (currentMode === 'pair') {
                        document.getElementById('pair-result').style.display = 'block';
                        document.getElementById('qr-result').style.display = 'none';
                        codeDisplay.textContent = data.code;
                    } else {
                        document.getElementById('pair-result').style.display = 'none';
                        document.getElementById('qr-result').style.display = 'block';
                        qrDisplay.innerHTML = '';
                        new QRCode(qrDisplay, {
                            text: data.qr,
                            width: 200,
                            height: 200
                        });
                    }
                } else {
                    throw new Error(data.message || 'Operation failed');
                }
            } catch (err) {
                alert('Error: ' + err.message);
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(codeDisplay.textContent);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy Code', 2000);
        }

        // --- Matrix BG Animation ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%"\'#&_(),.;:?!\\|{}<>[]^~';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) drops[x] = 1;

        function draw() {
            ctx.fillStyle = 'rgba(10, 14, 20, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00f2fe22';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        setInterval(draw, 33);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
